services:
  postgres:
    image: postgres:16-alpine
    container_name: meeting-agent-db
    environment:
      POSTGRES_DB: meeting_agent
      POSTGRES_USER: meeting
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting -d meeting_agent"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  meeting-agent:
    build: .
    container_name: meeting-agent
    ports:
      - "8000:8000"
    environment:
      # PostgreSQL — use internal Docker network hostname
      DATABASE_URL: postgresql://meeting:${POSTGRES_PASSWORD}@postgres:5432/meeting_agent
      # Forward from .env (docker-compose reads project .env automatically)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL_NAME: ${MODEL_NAME}
      TEMPERATURE: ${TEMPERATURE}
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      # Uploaded files (docx, pdf) — still on disk, not in DB
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
