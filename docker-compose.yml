services:
  meeting-agent:
    build: .
    container_name: meeting-agent
    ports:
      - "8011:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # PostgreSQL — use existing DB on host (ai_document_db, port 5432)
      DATABASE_URL: postgresql://meeting:${POSTGRES_PASSWORD}@host.docker.internal:5432/meeting_agent
      # Forward from .env (docker-compose reads project .env automatically)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL_NAME: ${MODEL_NAME}
      TEMPERATURE: ${TEMPERATURE}
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY}
    volumes:
      # Uploaded files (docx, pdf) — still on disk, not in DB
      - ./data:/app/data
    restart: unless-stopped

  meeting-agent-worker:
    build: .
    container_name: meeting-agent-worker
    command: [ "python", "-m", "meeting_agent.worker" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://meeting:${POSTGRES_PASSWORD}@host.docker.internal:5432/meeting_agent
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL_NAME: ${MODEL_NAME}
      TEMPERATURE: ${TEMPERATURE}
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY}
      EXTRACT_WORKER_CONCURRENCY: 2
      TRANSCRIBE_WORKER_CONCURRENCY: 2
    volumes:
      - ./data:/app/data
    restart: unless-stopped
